name: Build Android APK & Windows Installer

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'What to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - android-only
          - windows-only

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build React app
  # ─────────────────────────────────────────
  build-react:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: Build Windows Installer (Electron)
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    needs: build-react
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_target == 'both' || github.event.inputs.build_target == 'windows-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Setup Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install pillow

      - name: Generate icon.png and icon.ico from same artwork
        shell: python
        run: |
          from PIL import Image, ImageDraw
          import io, os, struct

          def draw_icon(size):
              img  = Image.new('RGBA', (size, size), (0,0,0,0))
              draw = ImageDraw.Draw(img)
              cx = cy = size // 2
              r  = int(size * 0.47)
              for i in range(r, 0, -2):
                  t = i / r
                  draw.ellipse([cx-i, cy-i, cx+i, cy+i],
                               fill=(int(10+t*16), int(20+t*55), int(40+t*80), 255))
              draw.ellipse([cx-r, cy-r, cx+r, cy+r],
                           outline=(26,107,138,255), width=max(2, size//90))
              arm = int(size * 0.44); w = int(size * 0.22)
              rad = max(4, size // 22)
              draw.rounded_rectangle([cx-w//2, cy-arm//2, cx+w//2, cy+arm//2],
                                     radius=rad, fill=(22,184,163,240))
              draw.rounded_rectangle([cx-arm//2, cy-w//2, cx+arm//2, cy+w//2],
                                     radius=rad, fill=(22,184,163,240))
              hole = int(size * 0.105)
              for i in range(hole, 0, -2):
                  t = i / hole
                  draw.ellipse([cx-i, cy-i, cx+i, cy+i],
                               fill=(int(10+t*16), int(20+t*55), int(40+t*80), 255))
              rr = int(size * 0.078); rw = max(3, size // 42)
              draw.ellipse([cx-rr, cy-rr, cx+rr, cy+rr],
                           outline=(240,200,96,255), width=rw)
              sw  = max(2, size//56)
              sy0 = cy - rr - int(size * 0.055)
              sy1 = cy - rr + rw
              if sy1 > sy0:
                  draw.rectangle([cx-sw, sy0, cx+sw, sy1], fill=(240,200,96,255))
              kd = max(4, size//44)
              draw.ellipse([cx-kd, sy0-kd, cx+kd, sy0+kd], fill=(240,200,96,255))
              mask = Image.new('L', (size, size), 0)
              ImageDraw.Draw(mask).ellipse([cx-r, cy-r, cx+r, cy+r], fill=255)
              img.putalpha(mask)
              return img

          def build_ico(sizes):
              png_bufs = []
              for s in sizes:
                  buf = io.BytesIO()
                  draw_icon(s).save(buf, format='PNG')
                  png_bufs.append(buf.getvalue())
              n = len(sizes)
              offsets = []
              offset  = 6 + 16 * n
              for b in png_bufs:
                  offsets.append(offset)
                  offset += len(b)
              out = bytearray()
              out += struct.pack('<HHH', 0, 1, n)
              for i, (s, b) in enumerate(zip(sizes, png_bufs)):
                  w = 0 if s >= 256 else s
                  h = 0 if s >= 256 else s
                  out += struct.pack('<BBBBHHII', w, h, 0, 0, 1, 32, len(b), offsets[i])
              for b in png_bufs:
                  out += b
              return bytes(out)

          os.makedirs('public', exist_ok=True)

          # icon.png — 512×512 (same artwork)
          draw_icon(512).save('public/icon.png')
          print(f"icon.png saved: {os.path.getsize('public/icon.png'):,} bytes")

          # icon.ico — same artwork, 6 sizes, proper Windows ICO binary
          ico = build_ico([16, 32, 48, 64, 128, 256])
          with open('public/icon.ico', 'wb') as f:
              f.write(ico)
          print(f"icon.ico saved: {len(ico):,} bytes — 6 sizes (16 to 256)")

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 3: Build Android APK (Capacitor)
  # ─────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: build-react
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_target == 'both' || github.event.inputs.build_target == 'android-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor with dist
        run: npx cap sync android

      - name: Install Pillow for icon generation
        run: pip install pillow

      - name: Generate Android launcher icons and splash screen
        run: |
          python3 << 'PY'
          from PIL import Image, ImageDraw
          import os

          def draw_icon(size, square=False):
              img  = Image.new('RGBA', (size, size), (0,0,0,0))
              draw = ImageDraw.Draw(img)
              cx = cy = size // 2
              r  = int(size * 0.47)
              for i in range(r, 0, -2):
                  t = i / r
                  draw.ellipse([cx-i, cy-i, cx+i, cy+i],
                               fill=(int(10+t*16), int(20+t*55), int(40+t*80), 255))
              draw.ellipse([cx-r, cy-r, cx+r, cy+r],
                           outline=(26,107,138,255), width=max(2, size//90))
              arm = int(size * 0.44); w = int(size * 0.22)
              rad = max(4, size // 22)
              draw.rounded_rectangle([cx-w//2, cy-arm//2, cx+w//2, cy+arm//2],
                                     radius=rad, fill=(22,184,163,240))
              draw.rounded_rectangle([cx-arm//2, cy-w//2, cx+arm//2, cy+w//2],
                                     radius=rad, fill=(22,184,163,240))
              hole = int(size * 0.105)
              for i in range(hole, 0, -2):
                  t = i / hole
                  draw.ellipse([cx-i, cy-i, cx+i, cy+i],
                               fill=(int(10+t*16), int(20+t*55), int(40+t*80), 255))
              rr = int(size * 0.078); rw = max(3, size // 42)
              draw.ellipse([cx-rr, cy-rr, cx+rr, cy+rr],
                           outline=(240,200,96,255), width=rw)
              sw  = max(2, size//56)
              sy0 = cy - rr - int(size * 0.055)
              sy1 = cy - rr + rw
              if sy1 > sy0:
                  draw.rectangle([cx-sw, sy0, cx+sw, sy1], fill=(240,200,96,255))
              kd = max(4, size//44)
              draw.ellipse([cx-kd, sy0-kd, cx+kd, sy0+kd], fill=(240,200,96,255))
              mask = Image.new('L', (size, size), 0)
              ImageDraw.Draw(mask).ellipse([cx-r, cy-r, cx+r, cy+r], fill=255)
              img.putalpha(mask)
              if square:
                  bg = Image.new('RGB', (size, size), (10, 20, 40))
                  bg.paste(img, (0, 0), img)
                  return bg
              return img

          # Launcher icons
          launcher_sizes = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }
          res = 'android/app/src/main/res'
          for folder, sz in launcher_sizes.items():
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              icon = draw_icon(sz, square=True)
              icon.save(os.path.join(d, 'ic_launcher.png'))
              icon.save(os.path.join(d, 'ic_launcher_round.png'))
              print(f'  launcher {folder}: {sz}x{sz}')

          # Adaptive icon foreground
          for folder, sz in launcher_sizes.items():
              d = os.path.join(res, folder)
              fg = draw_icon(sz, square=False)
              bg = Image.new('RGBA', (sz, sz), (10, 20, 40, 255))
              bg.paste(fg, (0, 0), fg)
              bg.save(os.path.join(d, 'ic_launcher_foreground.png'))

          # Splash screens
          splash_configs = [
              ('drawable',       288),
              ('drawable-hdpi',  288),
              ('drawable-xhdpi', 384),
              ('drawable-xxhdpi',432),
          ]
          for folder, icon_sz in splash_configs:
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              splash = Image.new('RGB', (1080, 1920), (10, 20, 40))
              icon   = draw_icon(icon_sz, square=False)
              x = (1080 - icon_sz) // 2
              y = (1920 - icon_sz) // 2
              splash.paste(icon, (x, y), icon)
              splash.save(os.path.join(d, 'splash.png'))
              print(f'  splash   {folder}: icon {icon_sz}px on 1080x1920')

          print('All icons and splash screens done!')
          PY

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anisha-survey.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/anisha-survey.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: Create GitHub Release
  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-android.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows installer
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-files/

      - name: Download Android APK
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files/

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "Anisa Survey App v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Anisa Medical Hazardous Waste Survey App
            **Honiara Referral Hospital · Solomon Islands**

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `Anisa Medical Survey Setup.exe` |
            | 🤖 Android | `anisha-survey.apk` |

            ### Installation
            **Windows:** Run the `.exe` installer and follow the setup wizard.
            **Android:** Enable "Install from unknown sources" in Settings, then open `anisha-survey.apk`.
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
