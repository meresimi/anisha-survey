name: Anisa Survey App — Build

on:
  workflow_dispatch:

jobs:

  # ═══════════════════════════════════════════════════
  # JOB 1 — Build React App
  # ═══════════════════════════════════════════════════
  build-react:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Upload React dist
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════
  # JOB 2 — Build Android APK
  # ═══════════════════════════════════════════════════
  build-android:
    name: Build Android APK
    needs: build-react
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor with dist
        run: npx cap sync android

      - name: Install Pillow
        run: pip install pillow

      - name: Generate Android icons from icon.png (72% fill)
        run: |
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          src  = Image.open('public/icon.png').convert('RGBA')
          FILL = 0.72

          def make_launcher(source, frame):
              content = round(frame * FILL)
              pad     = (frame - content) // 2
              face    = source.resize((content, content), Image.LANCZOS)
              bg      = Image.new('RGB', (frame, frame), (10, 20, 40))
              bg.paste(face.convert('RGB'), (pad, pad))
              return bg

          def make_foreground(source, frame):
              content = round(frame * FILL)
              pad     = (frame - content) // 2
              face    = source.resize((content, content), Image.LANCZOS)
              mask    = Image.new('L', (content, content), 0)
              ImageDraw.Draw(mask).ellipse([0, 0, content-1, content-1], fill=255)
              circle  = Image.new('RGBA', (content, content), (0,0,0,0))
              circle.paste(face, (0,0), mask)
              result  = Image.new('RGBA', (frame, frame), (0,0,0,0))
              result.paste(circle, (pad, pad), circle)
              return result

          res = 'android/app/src/main/res'
          for folder, sz in [('mipmap-mdpi',48),('mipmap-hdpi',72),
                              ('mipmap-xhdpi',96),('mipmap-xxhdpi',144),
                              ('mipmap-xxxhdpi',192)]:
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              make_launcher(src, sz).save(os.path.join(d, 'ic_launcher.png'))
              make_launcher(src, sz).save(os.path.join(d, 'ic_launcher_round.png'))
              make_foreground(src, sz).save(os.path.join(d, 'ic_launcher_foreground.png'))
              print(f'  {folder}: {sz}px frame  {round(sz*FILL)}px face')

          for folder, icon_sz in [('drawable',320),('drawable-hdpi',320),
                                   ('drawable-xhdpi',420),('drawable-xxhdpi',480)]:
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              splash = Image.new('RGB', (1080, 1920), (10, 20, 40))
              face   = src.resize((icon_sz, icon_sz), Image.LANCZOS)
              mask   = Image.new('L', (icon_sz, icon_sz), 0)
              ImageDraw.Draw(mask).ellipse([0, 0, icon_sz-1, icon_sz-1], fill=255)
              circle = Image.new('RGBA', (icon_sz, icon_sz), (0,0,0,0))
              circle.paste(face, (0,0), mask)
              splash.paste(circle, ((1080-icon_sz)//2, (1920-icon_sz)//2), circle)
              splash.save(os.path.join(d, 'splash.png'))
              print(f'  splash {folder}: {icon_sz}px')

          print('Android icons done!')
          PYEOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.1'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Pre-warm Gradle (with retries)
        run: |
          cd android
          for i in 1 2 3; do
            echo "Attempt $i..."
            ./gradlew --version --no-daemon && echo "Gradle ready!" && break || sleep 20
          done

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Dorg.gradle.internal.http.socketTimeout=120000 \
            -Dorg.gradle.internal.http.connectionTimeout=120000

      - name: Rename APK to anisha-survey.apk
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/anisha-survey.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/anisha-survey.apk
          retention-days: 30

  # ═══════════════════════════════════════════════════
  # JOB 3 — Create GitHub Release
  # ═══════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    if: needs.build-android.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files/

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "Anisa Survey App v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Anisa Medical Hazardous Waste Survey App
            **Honiara Referral Hospital · Solomon Islands**

            ### Download
            | Platform | File |
            |---|---|
            | Android | `anisha-survey.apk` |

            ### Installation
            Enable "Install from unknown sources" in Settings, then open `anisha-survey.apk`.
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
