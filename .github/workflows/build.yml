name: Build Android APK & Windows Installer

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'What to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - android-only
          - windows-only

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build React app
  # ─────────────────────────────────────────
  build-react:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: Build Windows Installer (Electron)
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    needs: build-react
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_target == 'both' || github.event.inputs.build_target == 'windows-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Generate valid Windows ICO using PowerShell System.Drawing
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing

          function New-IconBitmap {
            param([int]$Size)
            $bmp = New-Object System.Drawing.Bitmap($Size, $Size)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias

            $cx = $Size / 2
            $r  = [int]($Size * 0.47)

            $navyBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(255, 10, 31, 61))
            $g.FillEllipse($navyBrush, ($cx - $r), ($cx - $r), ($r * 2), ($r * 2))
            $navyBrush.Dispose()

            $tealBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(240, 22, 184, 163))
            $arm = [int]($Size * 0.44); $w = [int]($Size * 0.22)
            $g.FillRectangle($tealBrush, ($cx - $w/2), ($cx - $arm/2), $w, $arm)
            $g.FillRectangle($tealBrush, ($cx - $arm/2), ($cx - $w/2), $arm, $w)
            $tealBrush.Dispose()

            $holeBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(255, 10, 31, 61))
            $hole = [int]($Size * 0.11)
            $g.FillEllipse($holeBrush, ($cx - $hole), ($cx - $hole), ($hole * 2), ($hole * 2))
            $holeBrush.Dispose()

            $goldPen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 240, 200, 96), [int]([Math]::Max(3, $Size / 42)))
            $ringR = [int]($Size * 0.078)
            $g.DrawEllipse($goldPen, ($cx - $ringR), ($cx - $ringR), ($ringR * 2), ($ringR * 2))
            $goldPen.Dispose()

            $borderPen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 26, 107, 138), [int]([Math]::Max(2, $Size / 90)))
            $g.DrawEllipse($borderPen, ($cx - $r + 1), ($cx - $r + 1), ($r * 2 - 2), ($r * 2 - 2))
            $borderPen.Dispose()

            $g.Dispose()
            return $bmp
          }

          $sizes    = @(16, 32, 48, 64, 128, 256)
          $pngDatas = @()
          foreach ($size in $sizes) {
            $bmp = New-IconBitmap -Size $size
            $ms  = New-Object System.IO.MemoryStream
            $bmp.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $pngDatas += , $ms.ToArray()
            $bmp.Dispose(); $ms.Dispose()
          }

          $count = $sizes.Count
          $headerSz  = 6; $dirEntrySz = 16
          $offset    = $headerSz + $dirEntrySz * $count
          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)
          $bw.Write([uint16]0); $bw.Write([uint16]1); $bw.Write([uint16]$count)
          for ($i = 0; $i -lt $count; $i++) {
            $sz = $sizes[$i]; $len = $pngDatas[$i].Length
            $bw.Write([byte]$(if ($sz -ge 256) { 0 } else { $sz }))
            $bw.Write([byte]$(if ($sz -ge 256) { 0 } else { $sz }))
            $bw.Write([byte]0); $bw.Write([byte]0)
            $bw.Write([uint16]1); $bw.Write([uint16]32)
            $bw.Write([uint32]$len); $bw.Write([uint32]$offset)
            $offset += $len
          }
          foreach ($png in $pngDatas) { $bw.Write($png) }
          $bw.Flush()
          $icoBytes = $ms.ToArray(); $bw.Dispose(); $ms.Dispose()
          [System.IO.File]::WriteAllBytes("$PWD\public\icon.ico", $icoBytes)
          Write-Host "Generated icon.ico: $($icoBytes.Length) bytes"

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 3: Build Android APK (Capacitor)
  # ─────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: build-react
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_target == 'both' || github.event.inputs.build_target == 'android-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor with dist
        run: npx cap sync android

      - name: Generate and inject Android launcher icons + splash
        run: |
          pip install pillow
          python3 << 'PY'
          from PIL import Image, ImageDraw
          import os

          def draw_icon(size, square=False):
              """
              Draw the app icon. If square=True, return a flat RGB image
              (needed for Android launcher PNGs). If square=False, return
              RGBA with circular mask (for splash / web use).
              """
              img  = Image.new('RGBA', (size, size), (0,0,0,0))
              draw = ImageDraw.Draw(img)
              cx = cy = size // 2
              r  = int(size * 0.47)

              # Navy gradient background
              for i in range(r, 0, -2):
                  t = i / r
                  draw.ellipse([cx-i, cy-i, cx+i, cy+i],
                               fill=(int(10+t*16), int(20+t*55), int(40+t*80), 255))

              # Border ring
              draw.ellipse([cx-r, cy-r, cx+r, cy+r],
                           outline=(26,107,138,255), width=max(2, size//90))

              # Teal cross
              arm = int(size * 0.44); w = int(size * 0.22)
              rad = max(4, size // 22)
              draw.rounded_rectangle([cx-w//2, cy-arm//2, cx+w//2, cy+arm//2],
                                     radius=rad, fill=(22,184,163,240))
              draw.rounded_rectangle([cx-arm//2, cy-w//2, cx+arm//2, cy+w//2],
                                     radius=rad, fill=(22,184,163,240))

              # Navy centre hole
              hole = int(size * 0.105)
              for i in range(hole, 0, -2):
                  t = i / hole
                  draw.ellipse([cx-i, cy-i, cx+i, cy+i],
                               fill=(int(10+t*16), int(20+t*55), int(40+t*80), 255))

              # Gold ring
              rr = int(size * 0.078); rw = max(3, size // 42)
              draw.ellipse([cx-rr, cy-rr, cx+rr, cy+rr],
                           outline=(240,200,96,255), width=rw)

              # Gold stem
              sw  = max(2, size//56)
              sy0 = cy - rr - int(size * 0.055)
              sy1 = cy - rr + rw
              if sy1 > sy0:
                  draw.rectangle([cx-sw, sy0, cx+sw, sy1], fill=(240,200,96,255))
              kd = max(4, size//44)
              draw.ellipse([cx-kd, sy0-kd, cx+kd, sy0+kd], fill=(240,200,96,255))

              # Clip to circle
              mask = Image.new('L', (size, size), 0)
              ImageDraw.Draw(mask).ellipse([cx-r, cy-r, cx+r, cy+r], fill=255)
              img.putalpha(mask)

              if square:
                  # Flatten onto navy background for Android
                  bg = Image.new('RGB', (size, size), (10, 20, 40))
                  bg.paste(img, (0, 0), img)
                  return bg
              return img

          # ── Launcher icons (all mipmap densities) ─────────────
          launcher_sizes = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }
          res = 'android/app/src/main/res'
          for folder, sz in launcher_sizes.items():
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              icon = draw_icon(sz, square=True)
              # ic_launcher  — used for home screen icon
              icon.save(os.path.join(d, 'ic_launcher.png'))
              # ic_launcher_round — used for circular icon variant
              icon.save(os.path.join(d, 'ic_launcher_round.png'))
              print(f'  launcher {folder}: {sz}x{sz}')

          # ── Adaptive icon foreground (API 26+) ────────────────
          # Foreground is the icon centred in a larger canvas (108dp)
          # so the system can scale/clip it. We draw at 432px (4× 108dp).
          adaptive_size = 432
          fg = draw_icon(adaptive_size, square=False)  # keep RGBA
          # Place on transparent canvas with padding
          canvas = Image.new('RGBA', (adaptive_size, adaptive_size), (0,0,0,0))
          canvas.paste(fg, (0,0), fg)
          for folder in launcher_sizes:
              d = os.path.join(res, folder)
              canvas_resized = canvas.resize(
                  (launcher_sizes[folder], launcher_sizes[folder]),
                  Image.LANCZOS
              )
              canvas_resized.save(os.path.join(d, 'ic_launcher_foreground.png'))

          # ── Splash screen image ───────────────────────────────
          # Android splash: 1080×1920 (portrait) navy background + centred icon
          for folder, sz_splash in [('drawable', 288), ('drawable-hdpi', 288),
                                     ('drawable-xhdpi', 384), ('drawable-xxhdpi', 432)]:
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              splash = Image.new('RGB', (1080, 1920), (10, 20, 40))
              icon   = draw_icon(sz_splash, square=False)
              # Paste centred
              x = (1080 - sz_splash) // 2
              y = (1920 - sz_splash) // 2
              splash.paste(icon, (x, y), icon)
              splash.save(os.path.join(d, 'splash.png'))
              print(f'  splash   {folder}: icon {sz_splash}px centred on 1080×1920')

          print('All Android icons and splash screens generated!')
          PY

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anisha-survey.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/anisha-survey.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: Create GitHub Release
  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-android.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows installer
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-files/

      - name: Download Android APK
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files/

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "Anisa Survey App v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Anisa Medical Hazardous Waste Survey App
            **Honiara Referral Hospital · Solomon Islands**

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `Anisa Medical Survey Setup.exe` |
            | 🤖 Android | `anisha-survey.apk` |

            ### Installation
            **Windows:** Run the `.exe` installer and follow the setup wizard.
            **Android:** Enable "Install from unknown sources" in Settings, then open `anisha-survey.apk`.
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
