name: Build Android APK & Windows Installer

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'What to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - android-only
          - windows-only

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build React app
  # ─────────────────────────────────────────
  build-react:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: Build Windows Installer (Electron)
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    needs: build-react
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_target == 'both' || github.event.inputs.build_target == 'windows-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Setup Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install pillow

      - name: Convert icon.png to icon.ico (same image, proper Windows ICO format)
        shell: python
        run: |
          from PIL import Image
          import io, os, struct

          # Load icon.png from the repo — this is the single source of truth
          src = Image.open('public/icon.png').convert('RGBA')
          print(f"Source: {src.size} {src.mode}")

          sizes = [16, 32, 48, 64, 128, 256]
          bufs  = []
          for s in sizes:
              b = io.BytesIO()
              src.resize((s, s), Image.LANCZOS).save(b, format='PNG')
              bufs.append(b.getvalue())

          n      = len(sizes)
          offset = 6 + 16 * n
          offs   = []
          for b in bufs:
              offs.append(offset)
              offset += len(b)

          out = bytearray()
          out += struct.pack('<HHH', 0, 1, n)
          for i, (s, b) in enumerate(zip(sizes, bufs)):
              w = 0 if s >= 256 else s
              h = 0 if s >= 256 else s
              out += struct.pack('<BBBBHHII', w, h, 0, 0, 1, 32, len(b), offs[i])
          for b in bufs:
              out += b

          with open('public/icon.ico', 'wb') as f:
              f.write(out)
          print(f"icon.ico: {len(out):,} bytes, sizes={sizes}")

      - name: Build Windows installer
      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 3: Build Android APK (Capacitor)
  # ─────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: build-react
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_target == 'both' || github.event.inputs.build_target == 'android-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Download React dist
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor with dist
        run: npx cap sync android

      - name: Install Pillow for icon generation
        run: pip install pillow

      - name: Generate Android icons from icon.png (72% fill, 14% padding each side)
        run: |
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          src = Image.open('public/icon.png').convert('RGBA')
          print(f"Source icon.png: {src.size}")

          FILL = 0.72  # photo fills 72% of frame — 14% padding each side

          def make_launcher(source, frame):
              """Square RGB icon: photo at FILL%, centred on navy background."""
              content = round(frame * FILL)
              pad     = (frame - content) // 2
              face    = source.resize((content, content), Image.LANCZOS)
              bg      = Image.new('RGB', (frame, frame), (10, 20, 40))
              bg.paste(face.convert('RGB'), (pad, pad))
              return bg

          def make_foreground(source, frame):
              """RGBA adaptive icon foreground: circular photo at FILL%."""
              content = round(frame * FILL)
              pad     = (frame - content) // 2
              face    = source.resize((content, content), Image.LANCZOS)
              mask    = Image.new('L', (content, content), 0)
              ImageDraw.Draw(mask).ellipse([0, 0, content-1, content-1], fill=255)
              circle  = Image.new('RGBA', (content, content), (0,0,0,0))
              circle.paste(face, (0,0), mask)
              result  = Image.new('RGBA', (frame, frame), (0,0,0,0))
              result.paste(circle, (pad, pad), circle)
              return result

          res = 'android/app/src/main/res'
          for folder, sz in [
              ('mipmap-mdpi',    48),
              ('mipmap-hdpi',    72),
              ('mipmap-xhdpi',   96),
              ('mipmap-xxhdpi',  144),
              ('mipmap-xxxhdpi', 192),
          ]:
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              make_launcher(src, sz).save(os.path.join(d, 'ic_launcher.png'))
              make_launcher(src, sz).save(os.path.join(d, 'ic_launcher_round.png'))
              make_foreground(src, sz).save(os.path.join(d, 'ic_launcher_foreground.png'))
              content_sz = round(sz * FILL)
              pad        = (sz - content_sz) // 2
              print(f"  {folder}: {sz}px frame  {content_sz}px face  {pad}px padding")

          # Splash screen — circular photo centred on navy 1080x1920
          for folder, icon_sz in [
              ('drawable',        320),
              ('drawable-hdpi',   320),
              ('drawable-xhdpi',  420),
              ('drawable-xxhdpi', 480),
          ]:
              d = os.path.join(res, folder)
              os.makedirs(d, exist_ok=True)
              splash = Image.new('RGB', (1080, 1920), (10, 20, 40))
              face   = src.resize((icon_sz, icon_sz), Image.LANCZOS)
              mask   = Image.new('L', (icon_sz, icon_sz), 0)
              ImageDraw.Draw(mask).ellipse([0, 0, icon_sz-1, icon_sz-1], fill=255)
              circle = Image.new('RGBA', (icon_sz, icon_sz), (0,0,0,0))
              circle.paste(face, (0,0), mask)
              x = (1080 - icon_sz) // 2
              y = (1920 - icon_sz) // 2
              splash.paste(circle, (x, y), circle)
              splash.save(os.path.join(d, 'splash.png'))
              print(f"  splash {folder}: {icon_sz}px")

          print('Android icons done!')
          PYEOF
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.1'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Pre-warm Gradle (download with retries)
        run: |
          cd android
          for i in 1 2 3; do
            echo "Attempt $i: downloading Gradle..."
            ./gradlew --version --no-daemon && echo "Gradle ready!" && break || sleep 20
          done

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Dorg.gradle.internal.http.socketTimeout=120000 \
            -Dorg.gradle.internal.http.connectionTimeout=120000

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anisha-survey.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/anisha-survey.apk
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: Create GitHub Release
  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: always() && (needs.build-windows.result == 'success' || needs.build-android.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows installer
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-files/

      - name: Download Android APK
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files/

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "Anisa Survey App v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Anisa Medical Hazardous Waste Survey App
            **Honiara Referral Hospital · Solomon Islands**

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `Anisa Medical Survey Setup.exe` |
            | 🤖 Android | `anisha-survey.apk` |

            ### Installation
            **Windows:** Run the `.exe` installer and follow the setup wizard.
            **Android:** Enable "Install from unknown sources" in Settings, then open `anisha-survey.apk`.
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
